apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shared-app-route
  namespace: demo-app
spec:
  parentRefs:
    - name: shared-app-gw
      namespace: api-gateway
  hostnames:
    - replace-me.invalid
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: blue-app
          port: 8080
