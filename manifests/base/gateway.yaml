apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: shared-app-gw
  namespace: api-gateway
  labels:
    kuadrant.io/gateway: "true"
spec:
  gatewayClassName: istio
  listeners:
    - name: https
      hostname: greenblue.sandbox3573.opentlc.com
      port: 443
      protocol: HTTPS
      allowedRoutes:
        namespaces:
          from: All
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: api-shared-app-gw-tls
